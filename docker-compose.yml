version: "3.9"

services:
  relayer:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PRIVATE_KEY: ${PRIVATE_KEY}
      RPC_URL: ${RPC_URL}
      GATEWAY_ADDRESS: ${GATEWAY_ADDRESS}
      GATEWAY_URL: ${GATEWAY_URL:-http://gateway:8080}
      FHISH_RELAYER_SECRET: ${FHISH_RELAYER_SECRET}
      HEALTH_PORT: "3001"
    ports:
      - "3001:3001"
    networks:
      - fhish-net
    depends_on:
      - gateway

networks:
  fhish-net:
    driver: bridge
